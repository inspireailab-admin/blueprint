name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  test:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Verify module is tidy
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

      - name: Vet
        run: go vet ./...

      - name: Test
        # -race only on Linux: Go 1.22's -race + cgo has dyld issues
        # on macos-latest, and we don't need three runs of the race
        # detector anyway.
        run: |
          if [ "${{ matrix.os }}" = "ubuntu-latest" ]; then
            go test -race -coverprofile=coverage.out -covermode=atomic ./...
          else
            go test -coverprofile=coverage.out -covermode=count ./...
          fi

      - name: Coverage summary
        if: matrix.os == 'ubuntu-latest'
        run: go tool cover -func=coverage.out | tail -1

      - name: Build
        run: go build -o blueprint ./
